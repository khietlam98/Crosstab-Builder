<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WinCross Syntax Builder</title>

  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <div class="app">

    <header class="header">
      <h1>WinCross Syntax Builder</h1>
    </header>

    <main class="main-layout">

      <section class="card">
        <h2>Input</h2>

              <div class="form-group">
        <label for="projectType">Project Setting</label>
        <select id="projectType">
          <option value="N2" selected>N2</option>
          <option value="P2">P2</option>
          <option value="F4">F4</option>
        </select>
      </div>

        <div class="form-group">
          <label for="questionCode">Question Code</label>
          <input id="questionCode" type="text" placeholder="Example: Q1, Q2, Q7" />
          <small>Input question codes here</small>
        </div>

        <div class="form-group">
          <label for="questionType">Question Type</label>
          <select id="questionType">
            <option value="" selected disabled>Please select a type...</option>  
            <option value="single_choice">Single-choice</option>
            <option value="summary_table">Summary table</option>
            <option value="array">Array</option>
          </select>
        </div>

        <div class="form-group">
          <label for="rowType">Row Type</label>
          <select id="rowType">
            <option value="" selected disabled>Please select a type...</option>
            <option value="custom_code">CUSTOM CODE</option>
            <option value="important">TOT IMPORTANT / TOT NOT IMPORTANT</option>
            <option value="good_bad">TOT GOOD / TOT BAD</option>
            <option value="agree_disagree">TOT AGREE / TOT DISAGREE</option>
            <option value="accept_unaccept">TOT ACCEPT / TOT UNACCEPT</option>
            <option value="confident_not_confident">TOT CONFIDENT / TOT NOT CONFIDENT</option>
            <option value="yes_no">TOT YES / TOT NO</option>
            <option value="more_less_likely">TOT MORE LIKELY / TOT LESS LIKELY</option>
            <option value="convincing_not_convincing">TOT CONVINCING / TOT NOT CONVINCING</option>
            <option value="adequate_inadequate">TOT ADEQUATE / TOT INADEQUATE</option>
          </select>
        </div>

        <div class="form-group">
          <label for="questionText">Question Text</label>
          <textarea id="questionText" placeholder="Paste question text here..."></textarea>
        </div>

            <div id="answerOptionsBox" class="form-group">
            <label for="answerOptions">Answer Options</label>
            <textarea id="answerOptions" placeholder="Paste answer options here. Example:
          1	DEFINITELY YES
          2	PROBABLY YES
          3	UNDECIDED, LEAN YES"></textarea>
          </div>

        <div class="checkbox-row">
          <input id="useST" type="checkbox" />
          <label for="useST">Active ST</label>
        </div>

        <div class="checkbox-row">
        <input id="useDS" type="checkbox" checked />
        <label for="useDS">Active D/S</label>
        </div>

        <div class="form-group">
          <label for="manualUseIndex">USE Index</label>
          <input id="manualUseIndex" type="number" placeholder="Optional. Example: 1, 5, 17" />
        </div>

        <div id="subtitleBox" class="form-group hidden">
        <label for="subtitleOnly">Subtitle Text</label>
        <textarea id="subtitleOnly" placeholder="For one question: enter one subtitle. For range Q10:15: enter one subtitle per line."></textarea>
        </div>

        <div class="form-group">
          <label for="baseType">Base Type</label>
          <select id="baseType">
            <option value="total_sample">Base / Total Sample</option>
            <option value="asked_base">Asked Base</option>
          </select>
        </div>

        <div id="askedBaseBox" class="form-group hidden">
          <label for="askedBaseText">Asked Base Text</label>
          <input id="askedBaseText" type="text" placeholder="Example: ASKED IF Q6:3-8" />
        </div>

        <div class="button-row">
          <button id="addBtn">Add Table</button>
          <button id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
          <button id="clearInputBtn" class="secondary">Clear Input</button>
        </div>
      </section>

<section class="card output-card">
  <div class="section-title">
    <h2>Output Syntax</h2>

    <div class="button-row no-margin">
      <button id="generateBtn">Generate</button>
      <button id="copyBtn">Copy All</button>
    </div>
  </div>

  <pre id="output"></pre>
</section>

<section class="card full">
  <div class="section-title">
    <h2>Input List</h2>
    <button id="clearAllBtn" class="danger">Clear All</button>
  </div>

  <div id="inputList" class="input-list"></div>
</section>
      </section>

    </main>

  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
